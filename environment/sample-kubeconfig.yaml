clusters:
  - name: prod-eu-west-1
    cluster:
      server: https://k8s-prod-eu.example.com
      version: "1.28.2"
      node_count: 12
      is_internet_facing: true
      network_policies_enabled: false
      namespaces:
        - default
        - kube-system
        - api-gateway
        - payments
        - notifications
        - monitoring
      workloads:
        - name: api-gateway
          namespace: api-gateway
          replicas: 3
          image: registry.example.com/api-gateway:2.1.4
        - name: payment-service
          namespace: payments
          replicas: 2
          image: registry.example.com/payment-svc:1.8.0
        - name: notification-worker
          namespace: notifications
          replicas: 4
          image: registry.example.com/notifier:3.0.1
      images:
        - registry.example.com/api-gateway:2.1.4
        - registry.example.com/payment-svc:1.8.0
        - registry.example.com/notifier:3.0.1
        - nginx:1.25.3
        - redis:7.2.3
        - postgres:15.4

  - name: prod-us-east-1
    cluster:
      server: https://k8s-prod-us.example.com
      version: "1.28.2"
      node_count: 8
      is_internet_facing: true
      network_policies_enabled: true
      namespaces:
        - default
        - kube-system
        - api-gateway
        - search
        - analytics
      workloads:
        - name: api-gateway
          namespace: api-gateway
          replicas: 3
          image: registry.example.com/api-gateway:2.1.4
        - name: search-service
          namespace: search
          replicas: 2
          image: registry.example.com/search:4.2.0
      images:
        - registry.example.com/api-gateway:2.1.4
        - registry.example.com/search:4.2.0
        - elasticsearch:8.11.0
        - nginx:1.25.3

  - name: staging-eu-west-1
    cluster:
      server: https://k8s-staging.example.com
      version: "1.29.1"
      node_count: 4
      is_internet_facing: false
      network_policies_enabled: true
      namespaces:
        - default
        - kube-system
        - staging
      workloads:
        - name: all-services
          namespace: staging
          replicas: 1
          image: registry.example.com/monolith:latest
      images:
        - registry.example.com/monolith:latest
        - nginx:1.25.4
        - redis:7.2.4
